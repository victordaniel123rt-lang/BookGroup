spring.application.name=BookGroup
server.port=9091

# --- Configuración de Base de Datos H2 ---
# Usamos una base de datos en memoria llamada "bookdb".
# El parámetro DB_CLOSE_DELAY=-1 evita que los datos se borren si todas las conexiones se cierran temporalmente.
spring.datasource.url=jdbc:h2:mem:bookdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# --- Configuraciones de JPA / Hibernate para H2 ---
# Cambiado a 'update' para que Hibernate cree automáticamente las tablas en memoria al iniciar
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.show-sql=true
# Dialecto específico para H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- Configuración de la Consola Web de H2 ---
# Habilita la interfaz web en http://localhost:9091/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Configuración del Pool de Conexiones (Hikari) ---
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# --- Logs de depuración para SQL ---
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE